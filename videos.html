<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Gallery — Yogi Ramsuratkumar</title>
  <meta name="description" content="Watch discourses, bhajans, and documentaries of Sri Yogi Ramsuratkumar." />
  <link rel="stylesheet" href="css/style.css" />
  <!-- SheetJS (reads Excel) + jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <!-- Static data files -->
  <script src="data/photos.js"></script>
  <script src="data/videos.js"></script>
  <script src="data/pdfs.js"></script>
  <script src="data/audios.js"></script>
  <script src="data/version.js"></script>
  <script src="js/footer.js"></script>
  <!-- Central data loader (localStorage › falls back to data JS files) -->
  <script src="data/data-loader.js"></script>
  <style>
    .no-data-msg {
      text-align: center; padding: 48px 20px;
      color: var(--text-light);
    }
    .no-data-msg .nd-icon { font-size: 2.8rem; display: block; margin-bottom: 12px; }
    .no-data-msg p { font-size: 0.95rem; }

    .video-thumb { position: relative; aspect-ratio: 16/9; background: linear-gradient(135deg,#061A0E,#1A6B2E); overflow: hidden; cursor: pointer; }
    .video-thumb iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
    .video-thumb-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: block; }
    img[data-src] {
      background: linear-gradient(90deg,#0a1f0f 25%,#142d1a 50%,#0a1f0f 75%);
      background-size: 200% 100%; animation: shimmer 1.2s infinite;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    .video-thumb-placeholder {
      width:100%; height:100%; display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:10px;
      background:linear-gradient(135deg,#061A0E 0%,#1A4020 60%,#2D6A1E 100%);
      color:rgba(255,215,0,0.55);
    }
    .video-thumb-placeholder .vt-icon { font-size:2.8rem; }
    .video-thumb-placeholder .vt-text { font-size:0.8rem; color:rgba(255,215,0,0.4); text-align:center; padding:0 14px; line-height:1.5; }
    .gallery-counter { text-align:center; font-size:0.82rem; color:var(--text-light); margin-bottom:20px; }
    .gallery-loading { text-align:center; color:var(--text-light); padding:40px; font-size:1rem; }
    .gallery-search {
      max-width: 480px; margin: 0 auto 20px;
      display: flex; border: 2px solid var(--border); border-radius: 50px;
      overflow: hidden; background: white; box-shadow: var(--shadow);
    }
    .gallery-search input { flex:1; padding:11px 20px; border:none; outline:none; font-size:0.92rem; font-family:inherit; background:transparent; color:var(--text-dark); }
    .gallery-search button { padding:11px 18px; background:var(--green); color:white; border:none; cursor:pointer; font-size:1rem; transition:var(--transition); }
    .gallery-search button:hover { background:var(--green-dark); }
  </style>
</head>
<body>

<!-- ===== HEADER ===== -->
<header class="header" id="header"></header>
<div class="menu-overlay" id="menuOverlay"></div>

<!-- ===== PAGE HEADER ===== -->
<div class="page-header">
  <div class="container">
    <nav class="breadcrumb">
      <a href="index.html">Home</a><span>›</span>
      <a href="photos.html">Gallery</a><span>›</span>
      <span>Videos</span>
    </nav>
    <h1>🎬 <span data-i18n="videos_page_title">Video Gallery</span></h1>
  </div>
</div>

<!-- ===== VIDEOS ===== -->
<section style="padding-top:32px; padding-bottom:60px;">
  <div class="container">

    <!-- ── Search ── -->
    <div class="gallery-search" id="videoSearchBox" style="display:none;">
      <input type="text" id="videoSearch" placeholder="Search videos by name or description…" data-i18n-ph="search_videos_ph" aria-label="Search videos" />
      <button id="videoSearchBtn">🔍</button>
    </div>

    <!-- ── Category Filters ── -->
    <div class="gallery-filters" id="videoFilters" style="display:none;">
      <button class="filter-btn active" data-filter="all">All Videos</button>
    </div>

    <p class="gallery-counter" id="videoCounter"></p>

    <!-- Video Grid -->
    <div class="video-grid" id="videoContainer">
      <div class="gallery-loading" id="videoPlaceholder">
        📊 Load <strong>content-manager.xlsx</strong> using the bar above to display videos.
      </div>
    </div>
    <!-- Infinite scroll sentinel -->
    <div id="sentinel" style="height:2px;display:none;"></div>
    <div id="loadingMore" data-i18n="loading_more_videos" style="display:none;text-align:center;padding:18px 0;color:var(--text-light);font-size:0.9rem;">⏳ Loading more videos…</div>

  </div>
</section>

<!-- ===== FOOTER ===== -->
<footer class="footer"></footer>

<button class="scroll-top" id="scrollTop" aria-label="Scroll to top">↑</button>
<script src="js/nav.js"></script>
<script src="js/main.js"></script>
<script>
$(function () {

  var BATCH           = 8;    /* 2 cols × 4 rows on desktop */
  var allSorted       = [];
  var currentFiltered = [];
  var loadedCount     = 0;
  var scrollObserver  = null;
  var imgObserver     = null;

  /* ── YouTube thumbnail helper ── */
  function getYouTubeThumb(url) {
    if (!url) return '';
    var m = url.match(/(?:embed\/|watch\?v=|youtu\.be\/)([A-Za-z0-9_-]{11})/);
    return m ? 'https://img.youtube.com/vi/' + m[1] + '/hqdefault.jpg' : '';
  }

  /* ── Lazy image loader ── */
  function getImgObserver() {
    if (imgObserver) return imgObserver;
    if (!('IntersectionObserver' in window)) return null;
    imgObserver = new IntersectionObserver(function (entries) {
      entries.forEach(function (entry) {
        if (!entry.isIntersecting) return;
        var img = entry.target;
        var src = img.getAttribute('data-src');
        if (!src) return;
        img.src = src;
        img.removeAttribute('data-src');
        imgObserver.unobserve(img);
      });
    }, { rootMargin: '400px' });
    return imgObserver;
  }
  function observeImages($scope) {
    var obs = getImgObserver();
    $scope.find('img[data-src]').each(function () {
      if (obs) { obs.observe(this); }
      else { $(this).attr('src', $(this).attr('data-src')).removeAttr('data-src'); }
    });
  }
  function resetImgObserver() {
    if (imgObserver) { imgObserver.disconnect(); imgObserver = null; }
  }

  /* ══════════════════════════════════════════════════════════
     Videos — Infinite Scroll
  ══════════════════════════════════════════════════════════ */
  function noDataMsg() {
    return '<div class="no-data-msg"><span class="nd-icon">🎬</span><p>' + t('no_videos') + '</p></div>';
  }

  function clearVideos() {
    if (scrollObserver) { scrollObserver.disconnect(); scrollObserver = null; }
    resetImgObserver();
    $('#videoSearchBox, #videoFilters, #sentinel, #loadingMore').hide();
    $('#videoContainer').html(noDataMsg());
    $('#videoCounter').text('');
    allSorted = []; currentFiltered = []; loadedCount = 0;
  }

  function buildAndRender() {
    allSorted = SITE_DATA.active(SITE_DATA.videos);

    var cats = [];
    allSorted.forEach(function (v) {
      if (v.category && $.inArray(v.category, cats) === -1) cats.push(v.category);
    });
    var $filters = $('#videoFilters').show().empty()
      .append('<button class="filter-btn active" data-filter="all">' + t('filter_all_videos') + '</button>');
    cats.forEach(function (c) {
      $filters.append('<button class="filter-btn" data-filter="' + c + '">' +
        c.charAt(0).toUpperCase() + c.slice(1) + '</button>');
    });

    $('#videoSearchBox').show();
    currentFiltered = allSorted;
    loadedCount = 0;
    $('#videoContainer').empty();
    appendBatch();
  }

  function makeCard(v) {
    var serial = '#' + String(v.serial).padStart(2, '0');
    var dur    = v.duration ? '<span>⏱ ' + v.duration + '</span>' : '';
    var thumb  = getYouTubeThumb(v.youtubeUrl);
    var $thumbArea = $('<div>', { 'class': 'video-thumb', 'data-src': v.youtubeUrl });
    if (thumb) {
      $thumbArea.append(
        $('<img>', { 'data-src': thumb, alt: v.name, 'class': 'video-thumb-img' })
          .on('error', function () {
            $(this).replaceWith(
              '<div class="video-thumb-placeholder">' +
                '<span class="vt-icon">▶</span>' +
                '<span class="vt-text">' + v.name + '</span>' +
              '</div>'
            );
          })
      );
    } else {
      $thumbArea.append(
        '<div class="video-thumb-placeholder">' +
          '<span class="vt-icon">▶</span>' +
          '<span class="vt-text">' + v.name + '</span>' +
        '</div>'
      );
    }
    $thumbArea.append(
      '<div class="video-play-btn">▶</div>',
      '<span class="serial-badge video-serial">' + serial + '</span>'
    );
    return $('<div>', { 'class': 'video-card fade-in', 'data-category': v.category }).append(
      $thumbArea,
      $('<div class="video-info">').append(
        '<h3 class="video-title">' + v.name + '</h3>',
        '<p class="video-desc">' + v.description + '</p>',
        '<div class="video-meta"><span>📂 ' + v.category + '</span>' + dur + '</div>'
      )
    );
  }

  function appendBatch() {
    var batch = currentFiltered.slice(loadedCount, loadedCount + BATCH);
    if (!batch.length && loadedCount === 0) {
      $('#videoContainer').html('<p class="gallery-loading">' + t('no_videos') + '</p>');
      $('#videoCounter').text(''); $('#sentinel').hide(); return;
    }
    var $container = $('#videoContainer');
    $.each(batch, function (i, v) { $container.append(makeCard(v)); });
    observeImages($container);
    loadedCount += batch.length;
    updateCounter();

    if (loadedCount < currentFiltered.length) {
      $('#sentinel').show(); setupObserver();
    } else {
      $('#sentinel').hide();
      if (scrollObserver) { scrollObserver.disconnect(); scrollObserver = null; }
    }
    if (typeof window.initFade === 'function') window.initFade();
  }

  function updateCounter() {
    var total = currentFiltered.length;
    $('#videoCounter').text(t('showing') + ' ' + Math.min(loadedCount, total) + ' ' + t('of') + ' ' + total + ' ' + t('label_videos'));
  }

  function setupObserver() {
    if (scrollObserver) scrollObserver.disconnect();
    scrollObserver = new IntersectionObserver(function (entries) {
      if (!entries[0].isIntersecting) return;
      $('#loadingMore').show();
      setTimeout(function () { appendBatch(); $('#loadingMore').hide(); }, 250);
    }, { rootMargin: '300px' });
    scrollObserver.observe(document.getElementById('sentinel'));
  }

  /* ── Combined filter + search ── */
  function applyFilter() {
    var f = $('.filter-btn.active').data('filter') || 'all';
    var q = $('#videoSearch').val().toLowerCase().trim();
    currentFiltered = allSorted.filter(function (v) {
      return (f === 'all' || v.category === f) &&
        (!q || (v.name || '').toLowerCase().indexOf(q) !== -1 ||
               (v.description || '').toLowerCase().indexOf(q) !== -1);
    });
    loadedCount = 0;
    $('#videoContainer').empty();
    if (scrollObserver) { scrollObserver.disconnect(); scrollObserver = null; }
    resetImgObserver();
    appendBatch();
  }

  $(document).on('click', '.filter-btn', function () {
    $('.filter-btn').removeClass('active'); $(this).addClass('active'); applyFilter();
  });
  $(document).on('input keyup', '#videoSearch', function (e) {
    if (e.key === 'Escape') $(this).val(''); applyFilter();
  });
  $(document).on('click', '#videoSearchBtn', function () { applyFilter(); });

  /* ── Play video on click (lazy iframe load) ── */
  $(document).on('click', '.video-play-btn', function () {
    var $thumb = $(this).closest('.video-thumb');
    var src    = $thumb.data('src');
    if (!src || src === '' || src.indexOf('REPLACE') !== -1) {
      alert('YouTube URL not set for this video.\nPlease update it in content-manager.xlsx via tools/excel-manager.html');
      return;
    }
    var autoSrc = src + (src.indexOf('?') !== -1 ? '&' : '?') + 'autoplay=1&rel=0';
    $thumb.empty().append('<iframe src="' + autoSrc + '" allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>');
  });

  /* ── Init ── */
  if (SITE_DATA.loaded && SITE_DATA.videos.length) {
    buildAndRender();
  } else {
    $('#videoContainer').html(noDataMsg());
  }

});
</script>
<script src="data/lang/en.js"></script>
<script src="data/lang/ta.js"></script>
<script src="data/lang-loader.js"></script>
</body>
</html>
